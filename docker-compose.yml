version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: querymind-postgres
    environment:
      POSTGRES_DB: querymind
      POSTGRES_USER: querymind_user
      POSTGRES_PASSWORD: querymind_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed_ecommerce.sql:/docker-entrypoint-initdb.d/01_seed_ecommerce.sql
      - ./data/seed_saas_metrics.sql:/docker-entrypoint-initdb.d/02_seed_saas_metrics.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querymind_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: querymind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: querymind-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://querymind_user:querymind_password@postgres:5432/querymind
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./agent:/app/agent
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: querymind-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: querymind-network
